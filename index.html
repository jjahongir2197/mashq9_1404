<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>

<style>

body {
font-family: Arial;
background-color: #f2f2f2;
padding: 20px;
}

.card {

background-color: white;

padding: 15px;

margin: 10px;

border-radius: 10px;

box-shadow: 0px 0px 5px gray;

}

.info {

margin-top: 20px;

background-color: #d9f2ff;

padding: 20px;

border-radius: 10px;

}

</style>

</head>

<body>

<h1>Books List</h1>

{% for b in books %}

<div class="card">

<h2>{{ b.name }}</h2>

<p>Price: {{ b.price }} $</p>

</div>

{% endfor %}

<div class="info">

<h2>Average Price:
{{ average_price }}
</h2>

<h2>Most Expensive:
{{ expensive.name }}
({{ expensive.price }} $)
</h2>

<h2>Cheapest:
{{ cheap.name }}
({{ cheap.price }} $)
</h2>

</div>

</body>
</html>
